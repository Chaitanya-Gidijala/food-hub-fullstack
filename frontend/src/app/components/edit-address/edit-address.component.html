<div class="edit-address-container">
  <h1>
    <mat-icon>edit_location</mat-icon>
    Edit Address
  </h1>

  <mat-card class="address-form-card">
    <mat-card-content>
      <form>
        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Address Type</mat-label>
            <mat-select [(ngModel)]="address.addressType" name="addressType">
              <mat-option *ngFor="let type of addressTypes" [value]="type">
                {{type}}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Custom Label (Optional)</mat-label>
            <input matInput [(ngModel)]="address.label" name="label" placeholder="e.g., Mom's House, Office">
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Full Name *</mat-label>
            <input matInput [(ngModel)]="address.fullName" name="fullName" required>
          </mat-form-field>
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Phone Number *</mat-label>
            <input matInput [(ngModel)]="address.phoneNumber" name="phoneNumber" required>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Address Line 1 *</mat-label>
            <input matInput [(ngModel)]="address.addressLine1" name="addressLine1" 
                   placeholder="House/Flat number, Building name" required>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Address Line 2 (Optional)</mat-label>
            <input matInput [(ngModel)]="address.addressLine2" name="addressLine2" 
                   placeholder="Area, Street, Sector">
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>City *</mat-label>
            <input matInput [(ngModel)]="address.city" name="city" required>
          </mat-form-field>
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>State *</mat-label>
            <input matInput [(ngModel)]="address.state" name="state" required>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Pincode *</mat-label>
            <input matInput [(ngModel)]="address.pincode" name="pincode" required>
          </mat-form-field>
          <mat-form-field appearance="outline" class="half-width">
            <mat-label>Landmark (Optional)</mat-label>
            <input matInput [(ngModel)]="address.landmark" name="landmark" 
                   placeholder="Near XYZ">
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-checkbox [(ngModel)]="address.isDefault" name="isDefault">
            Set as default address
          </mat-checkbox>
        </div>

        <div class="form-actions">
          <button mat-button (click)="cancel()">Cancel</button>
          <button mat-raised-button color="primary" (click)="updateAddress()" 
                  [disabled]="!isFormValid()">
            Update Address
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
