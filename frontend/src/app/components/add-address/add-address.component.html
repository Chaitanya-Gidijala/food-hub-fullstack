<!-- Professional Add Address Form -->
<div class="page-container dashboard-layout u-compact">
  <app-customer-sidebar></app-customer-sidebar>
  <div class="dashboard-content address-form-container">
  <div class="form-header">
    <button class="back-btn" (click)="cancel()" type="button">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div class="header-content">
      <h1>Add New Address</h1>
      <p>Enter your delivery details below</p>
    </div>
  </div>

  <div class="form-wrapper">
    <div class="form-card">
      <form>
        <div class="form-grid">
          <!-- Type and Label -->
          <div class="form-group full-width">
            <label>Address Type *</label>
            <div class="type-selector">
              <div class="type-option" 
                   *ngFor="let type of addressTypes" 
                   [class.active]="address.addressType === type"
                   (click)="address.addressType = type">
                <mat-icon>{{type === 'HOME' ? 'home' : type === 'WORK' ? 'business' : 'location_on'}}</mat-icon>
                <span>{{type}}</span>
              </div>
            </div>
          </div>

          <div class="form-group full-width">
            <label>Custom Label (Optional)</label>
            <div class="input-wrapper">
              <mat-icon class="input-icon">label</mat-icon>
              <input type="text" [(ngModel)]="address.label" name="label" placeholder="e.g., Mom's House, Office">
            </div>
          </div>

          <!-- Contact Details -->
          <div class="form-group">
            <label>Full Name *</label>
            <div class="input-wrapper">
              <mat-icon class="input-icon">person</mat-icon>
              <input type="text" [(ngModel)]="address.fullName" name="fullName" placeholder="Enter name" required>
            </div>
          </div>

          <div class="form-group">
            <label>Phone Number *</label>
            <div class="input-wrapper">
              <mat-icon class="input-icon">phone</mat-icon>
              <input type="tel" [(ngModel)]="address.phoneNumber" name="phoneNumber" placeholder="10-digit mobile number" required>
            </div>
          </div>

          <!-- Address Lines -->
          <div class="form-group full-width">
            <label>Address Line 1 *</label>
            <div class="input-wrapper">
              <mat-icon class="input-icon">home</mat-icon>
              <input type="text" [(ngModel)]="address.addressLine1" name="addressLine1" placeholder="House/Flat number, Building name" required>
            </div>
          </div>

          <div class="form-group full-width">
            <label>Address Line 2 (Optional)</label>
            <div class="input-wrapper">
              <mat-icon class="input-icon">map</mat-icon>
              <input type="text" [(ngModel)]="address.addressLine2" name="addressLine2" placeholder="Area, Street, Sector, Village">
            </div>
          </div>

          <!-- Location Info -->
          <div class="form-group">
            <label>City *</label>
            <div class="input-wrapper">
              <mat-icon class="input-icon">location_city</mat-icon>
              <input type="text" [(ngModel)]="address.city" name="city" placeholder="Enter city" required>
            </div>
          </div>

          <div class="form-group">
            <label>State *</label>
            <div class="input-wrapper">
              <mat-icon class="input-icon">map</mat-icon>
              <input type="text" [(ngModel)]="address.state" name="state" placeholder="Enter state" required>
            </div>
          </div>

          <div class="form-group">
            <label>Pincode *</label>
            <div class="input-wrapper">
              <mat-icon class="input-icon">pin_drop</mat-icon>
              <input type="text" [(ngModel)]="address.pincode" name="pincode" placeholder="6-digit pincode" required>
            </div>
          </div>

          <div class="form-group">
            <label>Landmark (Optional)</label>
            <div class="input-wrapper">
              <mat-icon class="input-icon">place</mat-icon>
              <input type="text" [(ngModel)]="address.landmark" name="landmark" placeholder="Near Apollo Hospital">
            </div>
          </div>
        </div>

        <div class="checkbox-wrapper">
          <label class="custom-checkbox">
            <input type="checkbox" [(ngModel)]="address.isDefault" name="isDefault">
            <span class="checkmark">
              <mat-icon>check</mat-icon>
            </span>
            <span class="checkbox-label">Set as default delivery address</span>
          </label>
        </div>

        <div class="form-actions">
          <button class="btn-secondary btn-compact" (click)="cancel()" type="button">Cancel</button>
          <button class="btn-primary btn-compact" (click)="saveAddress()" [disabled]="!isFormValid()" type="button">
            <span>Save Address</span>
            <mat-icon>save</mat-icon>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
</div>
