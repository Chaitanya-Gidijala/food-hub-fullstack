<!-- Premium Menu Page -->
<div class="menu-container">
  <div class="restaurant-header">
    <button class="back-btn" (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div class="restaurant-info">
      <h1>{{restaurantName}}</h1>
      <div class="restaurant-meta">
        <div class="meta-badge">
          <mat-icon>star</mat-icon>
          <span>4.5</span>
        </div>
        <span class="separator">•</span>
        <span>30-40 min</span>
        <span class="separator">•</span>
        <span>₹{{costForTwo}} for two</span>
      </div>
    </div>
  </div>

  <div class="menu-content">
    <div class="search-filter">
      <div class="search-box">
        <mat-icon>search</mat-icon>
        <input type="text" [(ngModel)]="searchTerm" (input)="filterItems()" placeholder="Search for dishes...">
      </div>
      <div class="filter-chips">
        <button class="chip" [class.active]="selectedCategory === ''" (click)="filterByCategory('')">All</button>
        <button class="chip" [class.active]="selectedCategory === cat" *ngFor="let cat of categories" (click)="filterByCategory(cat)">
          {{cat}}
        </button>
      </div>
    </div>

    <div class="menu-grid" *ngIf="filteredMenuItems.length > 0">
      <div class="menu-card" *ngFor="let item of filteredMenuItems">
        <div class="menu-image">
          <div class="image-placeholder">🍽️</div>
          <div class="veg-badge" [class.non-veg]="item.isNonVeg">
            <div class="dot"></div>
          </div>
        </div>
        <div class="menu-info">
          <h3>{{item.dishName}}</h3>
          <p class="description">{{item.description}}</p>
          <div class="menu-footer">
            <span class="price">₹{{item.price}}</span>
            <div class="quantity-control" *ngIf="getItemQuantity(item) > 0">
              <button class="qty-btn" (click)="decreaseQuantity(item)">
                <mat-icon>remove</mat-icon>
              </button>
              <span class="quantity">{{getItemQuantity(item)}}</span>
              <button class="qty-btn" (click)="increaseQuantity(item)">
                <mat-icon>add</mat-icon>
              </button>
            </div>
            <button class="add-btn" *ngIf="getItemQuantity(item) === 0" (click)="addToCart(item)" [disabled]="!item.available">
              <mat-icon>add</mat-icon>
              <span>{{item.available ? 'Add' : 'Unavailable'}}</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="empty-state" *ngIf="filteredMenuItems.length === 0">
      <div class="empty-icon">🍽️</div>
      <h3>No items found</h3>
      <p>Try different search terms or filters</p>
    </div>
  </div>

  <div class="cart-float" *ngIf="cartItemCount > 0" (click)="viewCart()">
    <div class="cart-info">
      <span class="cart-count">{{cartItemCount}} items</span>
      <span class="cart-total">₹{{cartTotal}}</span>
    </div>
    <span class="cart-text">View Cart</span>
    <mat-icon>arrow_forward</mat-icon>
  </div>
</div>
