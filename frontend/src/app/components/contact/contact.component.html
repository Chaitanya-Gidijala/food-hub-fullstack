<div class="page-container contact-page">
  <div class="contact-card">
    <div class="contact-header">
      <h1 class="contact-title">Contact Support</h1>
      <p class="contact-subtitle">Need help with an order? Fill out the form below and our team will get back to you within 24 hours.</p>
    </div>

    <form class="contact-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="john@example.com">
      </div>
      <div class="form-group">
        <label>Your Message</label>
        <textarea rows="4" placeholder="How can we help you?"></textarea>
      </div>
      <button type="submit" class="btn-primary-large">Send Message</button>
    </form>
  </div>
</div>
