<div class="auth-container">
  <div class="auth-left">
    <div class="auth-brand">
      <div class="brand-icon">
        <mat-icon>restaurant</mat-icon>
      </div>
      <h1>FoodHub</h1>
      <p>Delicious food, delivered fast</p>
    </div>

    <div class="auth-features">
      <div class="feature-item">
        <div class="feature-icon"><mat-icon>bolt</mat-icon></div>
        <span>30-minute delivery guarantee</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon"><mat-icon>storefront</mat-icon></div>
        <span>500+ top-rated restaurants</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon"><mat-icon>verified</mat-icon></div>
        <span>Safe & secure payments</span>
      </div>
    </div>

    <div class="auth-illustration">
      <div class="floating-food food-1">🍕</div>
      <div class="floating-food food-2">🍔</div>
      <div class="floating-food food-3">🍜</div>
      <div class="floating-food food-4">🍰</div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome back 👋</h2>
        <p>Login to continue your food journey</p>
      </div>

      <form (ngSubmit)="login()" class="auth-form" id="login-form">
        <div class="form-group">
          <label for="login-email">Email or Phone</label>
          <div class="input-wrapper">
            <mat-icon class="input-icon">email</mat-icon>
            <input
              id="login-email"
              type="text"
              [(ngModel)]="emailOrPhone"
              name="emailOrPhone"
              placeholder="Enter your email or phone"
              required>
          </div>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-wrapper">
            <mat-icon class="input-icon">lock</mat-icon>
            <input
              id="login-password"
              [type]="hidePassword ? 'password' : 'text'"
              [(ngModel)]="password"
              name="password"
              placeholder="Enter your password"
              required>
            <button type="button" class="toggle-password" (click)="hidePassword = !hidePassword">
              <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="login-submit-btn">
          <span>Login</span>
          <mat-icon>arrow_forward</mat-icon>
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/register" class="link">Sign up for free</a></p>
      </div>
    </div>
  </div>
</div>
